name: Deploy Supabase migrations

# Runs `supabase db push` against the linked project automatically —
# no manual SQL Editor step needed once the repo secrets below are set.
# Triggers whenever a migration file changes on main, or on demand from
# the Actions tab (Run workflow).
on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        run: supabase db push --yes --password "$SUPABASE_DB_PASSWORD"
